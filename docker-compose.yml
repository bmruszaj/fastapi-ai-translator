services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: translation-app
    environment:
      APP_DEVICE: cpu
      HF_HOME: /cache/huggingface
      HF_HUB_CACHE: /cache/huggingface/hub
    ports:
      - "8000:8000"
    volumes:
      - huggingface_cache:/cache/huggingface
    restart: unless-stopped

volumes:
  huggingface_cache:
